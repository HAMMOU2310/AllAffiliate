<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Smart Video Store</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; }
        .video-container { max-width: 800px; margin: auto; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #3b82f6; }
        video { width: 100%; }
        .lang-status { margin-top: 10px; color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🛠️ Shed Plans - Global Edition</h1>
    <div class="video-container">
        <video id="video" controls></video>
    </div>
    <div id="status" class="lang-status">جاري اكتشاف لغتك الأم...</div>

    <script>
        var video = document.getElementById('video');
        var status = document.getElementById('status');
        var userLang = navigator.language || navigator.userLanguage; 

        // هذا الرابط سيكون لمجلد البث الذي سيولده FFmpeg لاحقاً
        var videoSrc = 'playlist.m3u8'; 

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                status.innerText = "تم ضبط الصوت تلقائياً بناءً على لغتك: " + userLang;
                video.play();
            });
        }
    </script>
</body>
</html>
