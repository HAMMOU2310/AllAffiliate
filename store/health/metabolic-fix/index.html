<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        select { width: 100%; padding: 12px; background: #334155; color: white; border-radius: 8px; margin-bottom: 20px; border: none; cursor: pointer; }
        .honesty { background: #450a0a; padding: 25px; border-radius: 12px; border-right: 5px solid #ef4444; margin: 20px 0; font-weight: bold; min-height: 80px; }
        .btn { display: block; background: #22c55e; color: white; padding: 18px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; }
        .back { display: inline-block; margin-top: 20px; color: #94a3b8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <select onchange="updateText(this.value, this.options[this.selectedIndex].text)">
            <option value="الصدق الجذري: لا توجد حبة سحرية. هذا النظام يتطلب التزاماً غذائياً صارماً.">العربية (AR)</option>
            <option value="Radical Honesty: No magic pill. This requires strict dietary commitment.">English (EN)</option>
            <option value="Honnêteté Radicale : cela demande un effort.">Français (FR)</option>
            <option value="Radikale Ehrlichkeit: Das erfordert Einsatz.">Deutsch (DE)</option>
        </select>
        <h1>🥗 Metabolic Fix</h1>
        <div id="text" class="honesty">الصدق الجذري: لا توجد حبة سحرية. هذا النظام يتطلب التزاماً غذائياً صارماً.</div>
        <a href="https://www.clickbank.com/example-metabolic" class="btn">اشترِ الآن | Buy Now</a>
        <a href="../../../index.html" class="back">← العودة للمتجر</a>
    </div>
    <script>
        function updateText(val, langName) {
            const box = document.getElementById('text');
            box.innerText = val;
            box.style.direction = langName.includes('العربية') ? 'rtl' : 'ltr';
            box.style.textAlign = langName.includes('العربية') ? 'right' : 'left';
        }
    </script>
</body>
</html>
